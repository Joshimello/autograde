services:
  frontend:
    image: autograde-frontend-dev:latest
    build:
      context: ./frontend
      target: development
    command: bun --bun run dev --host 0.0.0.0
    environment:
      VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-http://127.0.0.1:8090}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
