services:
  frontend:
    image: autograde-frontend:latest
    build:
      context: ./frontend
      target: production
      args:
        VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-http://127.0.0.1:8090}
        VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
    depends_on:
      - pocketbase
    environment:
      VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL:-http://127.0.0.1:8090}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
    ports:
      - "3000:3000"
    networks:
      - runtime

  pocketbase:
    build:
      context: ./pocketbase
    environment:
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@example.com}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-change-me-please}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations:ro
      - ./pocketbase/pb_hooks:/pb/pb_hooks:ro
    networks:
      - runtime

  submissions-worker:
    build:
      context: ./submissions-worker
    depends_on:
      - pocketbase
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@example.com}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-change-me-please}
      SUBMISSION_RUNNER_IMAGE: autograde-submission-runner:latest
      SUBMISSION_RUNNER_NETWORK: autograde_runtime
      SUBMISSIONS_WORKER_CONCURRENCY: ${SUBMISSIONS_WORKER_CONCURRENCY:-2}
      SUBMISSIONS_WORKER_RUNS_DIR: /runs
      SUBMISSIONS_WORKER_RUNS_VOLUME: autograde_submissions_worker_runs
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - submissions_worker_runs:/runs
    networks:
      - runtime

  deployments-worker:
    build:
      context: ./deployments-worker
    depends_on:
      - pocketbase
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@example.com}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-change-me-please}
      DEPLOYMENT_RUNNER_IMAGE: autograde-deployment-runner:latest
      DEPLOYMENT_RUNNER_NETWORK: autograde_runtime
      DEPLOYMENTS_WORKER_CONCURRENCY: ${DEPLOYMENTS_WORKER_CONCURRENCY:-1}
      DEPLOYMENTS_WORKER_RUNS_DIR: /deployment-runs
      DEPLOYMENTS_WORKER_RUNS_VOLUME: autograde_deployments_worker_runs
      NETLIFY_API_BASE: ${NETLIFY_API_BASE:-https://api.netlify.com/api/v1}
      NETLIFY_API_TOKEN: ${NETLIFY_API_TOKEN:-}
      NETLIFY_SITE_ID: ${NETLIFY_SITE_ID:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - deployments_worker_runs:/deployment-runs
    networks:
      - runtime

  policies-worker:
    build:
      context: ./policies-worker
    depends_on:
      - pocketbase
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@example.com}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-change-me-please}
      MARKITDOWN_IMAGE: markitdown:latest
      MARKITDOWN_NETWORK: autograde_runtime
      POLICIES_WORKER_RUNS_DIR: /policy-runs
      POLICIES_WORKER_RUNS_VOLUME: autograde_policies_worker_runs
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - policies_worker_runs:/policy-runs
    networks:
      - runtime

  markitdown:
    image: markitdown:latest
    build:
      context: ./markitdown
    entrypoint: ["sh", "-c", "sleep infinity"]
    networks:
      - runtime

  submission-runner:
    image: autograde-submission-runner:latest
    build:
      context: ./submission-runner
    entrypoint: ["sh", "-c", "sleep infinity"]
    networks:
      - runtime

  deployment-runner:
    image: autograde-deployment-runner:latest
    build:
      context: ./deployment-runner
    entrypoint: ["sh", "-c", "sleep infinity"]
    networks:
      - runtime

volumes:
  pocketbase_data:
  submissions_worker_runs:
    name: autograde_submissions_worker_runs
  deployments_worker_runs:
    name: autograde_deployments_worker_runs
  policies_worker_runs:
    name: autograde_policies_worker_runs

networks:
  runtime:
    name: autograde_runtime
